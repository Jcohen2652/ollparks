name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-legacy:
    name: Backend Python (legacy — référence)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-legacy
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check .
        continue-on-error: true
      - name: Pytest (matching/outlook/pappers)
        run: pytest -v tests/test_matching_engine.py tests/test_outlook_extract.py tests/test_pappers_scoring.py tests/test_documents.py tests/test_auth.py
        env:
          DATABASE_URL: sqlite:///./test.db

  edge-functions:
    name: Edge Functions (Deno typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Type-check Edge Functions
        run: |
          cd supabase/functions
          for fn in matching outlook-sync pappers-enrich pappers-proprietaires document-generate; do
            echo "▶ $fn"
            deno check $fn/index.ts || exit 1
          done

  frontend:
    name: Frontend Next.js
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package.json
      - name: Install
        run: npm install
      - name: Typecheck
        run: npm run typecheck
        continue-on-error: true
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy_key_for_build
